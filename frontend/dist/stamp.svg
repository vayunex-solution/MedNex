<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      .stamp-text { 
        font-family: 'Arial Black', 'Arial', sans-serif; 
        font-weight: 900; 
        fill: #1a3b8a; 
        letter-spacing: 3px;
      }
    </style>
    <!-- Curved text paths -->
    <path id="topArc" d="M 60,150 A 90,90 0 0,1 240,150" fill="none"/>
    <path id="bottomArc" d="M 55,155 A 95,95 0 0,0 245,155" fill="none"/>
  </defs>

  <!-- Outer circle -->
  <circle cx="150" cy="150" r="138" fill="none" stroke="#1a3b8a" stroke-width="5"/>
  <!-- Inner circle -->
  <circle cx="150" cy="150" r="115" fill="none" stroke="#1a3b8a" stroke-width="3"/>

  <!-- Top text: ADS BIOCARE -->
  <text class="stamp-text" font-size="28" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">ADS BIOCARE</textPath>
  </text>

  <!-- Bottom text: AMBALA CANTT -->
  <text class="stamp-text" font-size="24" text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">AMBALA CANTT</textPath>
  </text>

  <!-- Left star -->
  <polygon points="62,150 68,142 74,150 68,145" fill="#1a3b8a" transform="translate(-2,0)"/>
  <polygon points="55,150 68,138 81,150 68,162" fill="none" stroke="#1a3b8a" stroke-width="0"/>
  <path d="M60,150 l5,-8 3,5 5,-3 -2,6 7,0 -5,4 3,5 -6,-2 -2,6 -2,-6 -6,2 3,-5 -5,-4z" fill="#1a3b8a"/>

  <!-- Right star -->
  <path d="M240,150 l-5,-8 -3,5 -5,-3 2,6 -7,0 5,4 -3,5 6,-2 2,6 2,-6 6,2 -3,-5 5,-4z" fill="#1a3b8a"/>
</svg>
