openapi: 3.1.0
info:
  title: Nex Platform Core - Business API
  version: 1.0.0
paths:
  /api/v1/platform/businesses:
    get:
      summary: List businesses
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: Create business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessInput'
      responses:
        '201':
          description: Created
components:
  schemas:
    BusinessInput:
      type: object
      required:
        - tenantUuid
        - name
      properties:
        tenantUuid:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
